# bot-A-gateway-bridge.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discord-bridge-bot-a
  namespace: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discord-bridge-bot-a
  template:
    metadata:
      labels:
        app: discord-bridge-bot-a
    spec:
      containers:
        - name: bridge
          image: chamodide/discord-bridge:test-10
          env:
            - name: VALKEY_URL
              value: "redis://valkey-primary.openclaw.svc.cluster.local:6379"
            - name: AGENT_NAME
              value: "bot-a"
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-user-a
                  key: DISCORD_BOT_TOKEN
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

