apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: bot-b
  namespace: openclaw
spec:
  suspended: true        # start suspended, KEDA wakes it
  # sidecars:
  #   - name: queue-drainer
  #     image: chamodide/discord-bridge:test-8
  #     command: ["node", "queue-drainer.mjs"]
  #     env:
  #       - name: VALKEY_URL
  #         value: "redis://valkey-primary.openclaw.svc.cluster.local:6379"
  #       - name: AGENT_NAME
  #         value: "bot-b"
  #       - name: OPENCLAW_URL
  #         value: "http://localhost:18789"
  envFrom:
    - secretRef:
        name: openclaw-api-keys
    - secretRef:
        name: openclaw-user-b
  config:
    raw:
      agents:
        defaults:
          model:
            primary: "github-copilot/gpt-4o-mini"
      channels:
        discord:
          enabled: true
          dmPolicy: "open"
          # allowFrom:
          #   - "*"
          # applicationId: "1509480784292085760"
          # token:
          #   source: env
          #   provider: default
          #   id: DISCORD_BOT_TOKEN
  storage:
    persistence:
      enabled: true
      size: 5Gi
      storageClass: manual
