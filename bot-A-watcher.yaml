# bot-a-watcher.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey-watcher-bot-a
  namespace: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valkey-watcher-bot-a
  template:
    metadata:
      labels:
        app: valkey-watcher-bot-a
    spec:
      serviceAccountName: valkey-watcher
      containers:
        - name: watcher
          image: chamodide/discord-bridge:test-8
          command: ["node", "valkey-watcher.mjs"]
          env:
            - name: VALKEY_URL
              value: "redis://valkey-primary.openclaw.svc.cluster.local:6379"
            - name: AGENT_NAME
              value: "bot-a"
            - name: INSTANCE_NAME
              value: "bot-a"        # exact name of your OpenClawInstance CR
            - name: NAMESPACE
              value: "openclaw"
            - name: COOLDOWN_MS
              value: "300000"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

