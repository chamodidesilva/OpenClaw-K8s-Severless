apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: bot-a
  namespace: openclaw
spec:
  suspended: true        # start suspended, KEDA wakes it
  sidecars:
    - name: queue-drainer
      image: chamodide/discord-bridge:test-8
      command: ["node", "queue-drainer.mjs"]
      env:
        - name: VALKEY_URL
          value: "redis://valkey-primary.openclaw.svc.cluster.local:6379"
        - name: AGENT_NAME
          value: "bot-a"
        - name: OPENCLAW_URL
          value: "http://localhost:18789"
  envFrom:
    - secretRef:
        name: openclaw-api-keys
    - secretRef:
        name: openclaw-user-a
  config:
    raw:
      agents:
        defaults:
          model:           
            primary: "github-copilot/gpt-4o-mini"
  # models:
  #   mode: merge
  #   providers:
  #     github-copilot:
  #       baseUrl: "https://models.inference.ai.azure.com"
  #       apiKey: "${GITHUB_TOKEN}"
  #       api: "openai-completions"
  #       models:
  #         - id: "claude-haiku-4.5"
  #           contextWindow: 200000
  #           maxTokens: 64000
  #           cost:
  #             input: 0
  #             output: 0
  #             cacheRead: 0
  #             cacheWrite: 0
  storage:
    persistence:
      enabled: true
      size: 5Gi
      storageClass: manual
